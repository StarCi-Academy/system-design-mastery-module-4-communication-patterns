# Docker Compose — lesson `0-api-gateway` C# track.
# (EN: Builds and runs the ASP.NET Core API Gateway + 3 ASP.NET Core micro-services.)
#
# Working directory: 0-api-gateway/2-csharp/.docker
#
# Start stack:
#   cd 0-api-gateway/2-csharp/.docker && docker compose up -d --build
#
# Cleanup:
#   docker compose down -v

name: 0-api-gateway-csharp

services:
  # API Gateway — ASP.NET Core minimal API on port 8000.
  api-gateway:
    build:
      context: ../api-gateway
      dockerfile: Dockerfile
    container_name: 0-api-gateway-csharp-gateway
    ports:
      - "8000:8000"
    networks:
      - 0-api-gateway-csharp
    depends_on:
      - user-service
      - product-service
      - order-service
    restart: unless-stopped

  # User Service on port 3001.
  user-service:
    build:
      context: ../user-service
      dockerfile: Dockerfile
    container_name: 0-api-gateway-csharp-user
    ports:
      - "3001:3001"
    networks:
      - 0-api-gateway-csharp
    restart: unless-stopped

  # Product Service on port 3002.
  product-service:
    build:
      context: ../product-service
      dockerfile: Dockerfile
    container_name: 0-api-gateway-csharp-product
    ports:
      - "3002:3002"
    networks:
      - 0-api-gateway-csharp
    restart: unless-stopped

  # Order Service on port 3003.
  order-service:
    build:
      context: ../order-service
      dockerfile: Dockerfile
    container_name: 0-api-gateway-csharp-order
    ports:
      - "3003:3003"
    networks:
      - 0-api-gateway-csharp
    restart: unless-stopped

networks:
  0-api-gateway-csharp:
    name: 0-api-gateway-csharp
