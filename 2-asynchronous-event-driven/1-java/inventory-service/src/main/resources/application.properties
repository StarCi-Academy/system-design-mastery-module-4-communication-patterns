# Kafka bootstrap address — overridden by KAFKA_BOOTSTRAP_SERVERS env var
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}

# Consume String values (events arrive as JSON strings)
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Consumer group — distinct from notification-consumer so Kafka fan-outs independently
spring.kafka.consumer.group-id=inventory-consumer

# Start from earliest offset so the consumer sees events published before it joined
spring.kafka.consumer.auto-offset-reset=earliest
