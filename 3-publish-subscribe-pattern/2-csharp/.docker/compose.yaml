# Docker Compose — lesson `3-publish-subscribe-pattern` (C#/ASP.NET Core track)
# (NATS Server + 1 publisher + 3 subscribers: Analytics, Notification, Audit).
#
# Working directory: 3-publish-subscribe-pattern/2-csharp/.docker
# Start stack:
#   cd 3-publish-subscribe-pattern/2-csharp/.docker && docker compose up -d --build
# Cleanup:
#   docker compose down -v

name: 3-pubsub-csharp

services:
  # ──────────────────────────────────────────────
  # NATS Server — high-speed fire-and-forget message broker.
  # ──────────────────────────────────────────────
  nats:
    image: nats:2.10-alpine
    container_name: csharp-nats
    ports:
      # Client connection port — mapped to 4233 to avoid conflict with other stacks.
      - "4233:4222"
      # HTTP monitoring port — mapped to 8233 to avoid conflict with other stacks.
      - "8233:8222"
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Publisher Service — ASP.NET Core Minimal API for POST /events.
  # ──────────────────────────────────────────────
  publisher-service:
    build:
      context: ../publisher-service
      dockerfile: Dockerfile
    container_name: csharp-publisher-service
    ports:
      # REST API for client to publish events — mapped to 3013 to avoid conflict with other stacks.
      - "3013:3001"
    environment:
      NATS_URL: nats://nats:4222
    depends_on:
      - nats
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Subscriber Analytics — receives app.events, updates analytics/metrics.
  # ──────────────────────────────────────────────
  subscriber-analytics:
    build:
      context: ../subscriber-analytics
      dockerfile: Dockerfile
    container_name: csharp-subscriber-analytics
    environment:
      NATS_URL: nats://nats:4222
    depends_on:
      - nats
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Subscriber Notification — receives app.events, sends email/push.
  # ──────────────────────────────────────────────
  subscriber-notification:
    build:
      context: ../subscriber-notification
      dockerfile: Dockerfile
    container_name: csharp-subscriber-notification
    environment:
      NATS_URL: nats://nats:4222
    depends_on:
      - nats
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Subscriber Audit — receives app.events, writes to audit log.
  # ──────────────────────────────────────────────
  subscriber-audit:
    build:
      context: ../subscriber-audit
      dockerfile: Dockerfile
    container_name: csharp-subscriber-audit
    environment:
      NATS_URL: nats://nats:4222
    depends_on:
      - nats
    restart: unless-stopped
