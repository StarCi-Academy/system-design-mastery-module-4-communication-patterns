# Docker Compose — lesson `3-publish-subscribe-pattern` (Go track)
# (NATS Server + 1 publisher + 3 subscribers: Analytics, Notification, Audit).
#
# Working directory: 3-publish-subscribe-pattern/3-go/.docker
# Start stack:
#   cd 3-publish-subscribe-pattern/3-go/.docker && docker compose up -d --build
# Cleanup:
#   docker compose down -v

name: 3-pubsub-go

services:
  # ──────────────────────────────────────────────
  # NATS Server — high-speed fire-and-forget message broker.
  # ──────────────────────────────────────────────
  nats:
    image: nats:2.10-alpine
    container_name: go-nats
    ports:
      # Client connection port — mapped to 4234 to avoid conflict with other stacks.
      - "4234:4222"
      # HTTP monitoring port — mapped to 8234 to avoid conflict with other stacks.
      - "8234:8222"
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Publisher Service — Go net/http API for POST /events.
  # ──────────────────────────────────────────────
  publisher-service:
    build:
      context: ../publisher-service
      dockerfile: Dockerfile
    container_name: go-publisher-service
    ports:
      # REST API for client to publish events — mapped to 3014 to avoid conflict with other stacks.
      - "3014:3001"
    environment:
      NATS_URL: nats://nats:4222
      PORT: "3001"
    depends_on:
      - nats
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Subscriber Analytics — receives app.events, updates analytics/metrics.
  # ──────────────────────────────────────────────
  subscriber-analytics:
    build:
      context: ../subscriber-analytics
      dockerfile: Dockerfile
    container_name: go-subscriber-analytics
    environment:
      NATS_URL: nats://nats:4222
    depends_on:
      - nats
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Subscriber Notification — receives app.events, sends email/push.
  # ──────────────────────────────────────────────
  subscriber-notification:
    build:
      context: ../subscriber-notification
      dockerfile: Dockerfile
    container_name: go-subscriber-notification
    environment:
      NATS_URL: nats://nats:4222
    depends_on:
      - nats
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Subscriber Audit — receives app.events, writes to audit log.
  # ──────────────────────────────────────────────
  subscriber-audit:
    build:
      context: ../subscriber-audit
      dockerfile: Dockerfile
    container_name: go-subscriber-audit
    environment:
      NATS_URL: nats://nats:4222
    depends_on:
      - nats
    restart: unless-stopped
