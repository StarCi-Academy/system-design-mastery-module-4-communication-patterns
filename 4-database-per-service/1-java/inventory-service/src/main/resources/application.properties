# Inventory Service — HTTP port (distinct from TS track port 3002).
server.port=${PORT:3012}
server.address=0.0.0.0

# MongoDB — URI from environment variable (mirrors INVENTORY_MONGO_URI in Compose).
spring.data.mongodb.uri=${INVENTORY_MONGO_URI:mongodb://localhost:27017/inventory_db}

# Kafka consumer — bootstrap servers and consumer group.
spring.kafka.bootstrap-servers=${KAFKA_BROKERS:localhost:9092}
spring.kafka.consumer.group-id=database-per-service-inventory
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
# Trust all packages so Jackson can deserialise the payload class.
spring.kafka.consumer.properties.spring.json.trusted.packages=*
# Default target type for deserialization — inventory only needs productName + quantity.
spring.kafka.consumer.properties.spring.json.value.default.type=com.starci.inventory.OrderEventPayload
# Producer does not send type headers (spring.json.add.type.headers=false) — disable header use on consumer.
spring.kafka.consumer.properties.spring.json.use.type.headers=false

# Jackson — ignore unknown JSON fields globally (belt-and-suspenders for Kafka payload).
spring.jackson.deserialization.fail-on-unknown-properties=false
