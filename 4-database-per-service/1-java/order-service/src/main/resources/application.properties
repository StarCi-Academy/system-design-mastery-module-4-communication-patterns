# Order Service — HTTP port (distinct from TS track port 3001).
server.port=${PORT:3011}
server.address=0.0.0.0

# PostgreSQL — connection wired through environment variables from Compose.
spring.datasource.url=jdbc:postgresql://${ORDER_DB_HOST:localhost}:${ORDER_DB_PORT:5432}/${ORDER_DB_NAME:order_db}
spring.datasource.username=${ORDER_DB_USER:order}
spring.datasource.password=${ORDER_DB_PASSWORD:order}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA — auto DDL for demo (mirrors TS synchronize: true for lab use only).
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Kafka producer — bootstrap servers from env.
spring.kafka.bootstrap-servers=${KAFKA_BROKERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
# Disable type headers so consumer can deserialize freely (no __TypeId__ header).
spring.kafka.producer.properties.spring.json.add.type.headers=false
