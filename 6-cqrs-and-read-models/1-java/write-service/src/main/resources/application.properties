# HTTP port — override via env PORT
server.port=${PORT:3000}

# PostgreSQL — Write Model
spring.datasource.url=jdbc:postgresql://${WRITE_DB_HOST:localhost}:${WRITE_DB_PORT:5432}/${WRITE_DB_NAME:cqrs_write}
spring.datasource.username=${WRITE_DB_USER:cqrs}
spring.datasource.password=${WRITE_DB_PASSWORD:cqrs}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate — auto-create schema (lab/demo only, mirrors TS synchronize:true)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# RabbitMQ connection
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
