# Event Store Service — Spring Boot configuration
# Reads from environment variables injected by Docker Compose.

server.port=${PORT:3000}

# PostgreSQL (Spring Data JPA / Hibernate)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:event_store}
spring.datasource.username=${DB_USER:eventsource}
spring.datasource.password=${DB_PASSWORD:eventsource}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate — auto-create tables on startup (lab/demo only).
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=${DB_LOGGING:false}
spring.jpa.open-in-view=false
